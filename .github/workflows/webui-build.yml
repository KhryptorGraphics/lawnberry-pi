name: webui-build
on: [pull_request]
concurrency:
  group: webui-build-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-ui:
    runs-on: ubuntu-latest
    # Use the official Playwright image: Chromium + all system libs are prebaked,
    # so we avoid the slow/flaky `playwright install --with-deps` apt step.
    container:
      image: mcr.microsoft.com/playwright:v1.48.0-jammy
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Run e2e tests
        # The e2e specs mock the backend (tests/e2e/utils/mock-backend.ts) and
        # Playwright serves the built frontend itself (webServer: npm run preview).
        working-directory: frontend
        run: npx playwright test
        env:
          CI: 'true'
