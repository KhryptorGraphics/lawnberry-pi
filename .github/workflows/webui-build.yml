name: webui-build
on: [pull_request]
concurrency:
  group: webui-build-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 'lts/*', cache: 'npm', cache-dependency-path: 'frontend/package-lock.json' }
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Install Playwright dependencies
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        # Playwright serves the built frontend itself (webServer: npm run preview);
        # no separate backend process is started here (the previous step used `uv`,
        # which isn't installed in this workflow, and a malformed module path).
        working-directory: frontend
        run: npm run test:e2e
